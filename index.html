<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ひらがな クイズ</title>
  <style>
    /* 全体の基本デザイン */
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0; padding: 0; background-color: #f7f9fa;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; color: #333; box-sizing: border-box;
      transition: background-color 0.3s;
    }
    
    /* 🎨 演出：正解時に画面全体を優しく緑に */
    body.correct-flash { background-color: #e8f5e9; }
    
    /* 🎨 演出：不正解時に画面を赤くしてガタガタ揺らす */
    body.wrong-flash { background-color: #ffebee; animation: shake 0.3s ease-in-out; }
    
    .page { display: none; width: 100%; max-width: 480px; text-align: center; padding: 20px; box-sizing: border-box; }
    .active { display: block; }
    
    h1 { font-size: 2.5rem; color: #ff6b6b; margin-bottom: 40px; text-shadow: 1px 1px 2px rgba(0,0,0,0.05); }
    
    /* 立体感のあるかわいいボタン */
    .btn {
      display: block; width: 85%; margin: 15px auto; padding: 18px;
      font-size: 1.4rem; font-weight: bold; border: none; border-radius: 30px;
      cursor: pointer; transition: all 0.15s; box-shadow: 0 6px 0px rgba(0,0,0,0.15), 0 8px 15px rgba(0,0,0,0.1);
    }
    /* ボタンを押したときのぷにっと沈む演出 */
    .btn:active { transform: translateY(4px); box-shadow: 0 2px 0px rgba(0,0,0,0.15), 0 4px 6px rgba(0,0,0,0.1); }
    .btn-easy { background-color: #4caf50; color: white; }
    .btn-normal { background-color: #ff9800; color: white; }
    .btn-hard { background-color: #f44336; color: white; }
    
    .status-bar { display: flex; justify-content: space-between; align-items: center; width: 95%; margin: 0 auto 20px; font-size: 1.1rem; font-weight: bold; color: #78909c; }
    .status-left { text-align: left; }
    
    /* 右上の丸みのあるパスボタン */
    .btn-skip { background-color: #b0bec5; color: white; font-size: 0.9rem; padding: 8px 18px; border-radius: 20px; box-shadow: 0 3px 6px rgba(0,0,0,0.1); border: none; cursor: pointer; transition: all 0.1s; }
    .btn-skip:active { background-color: #90a4ae; transform: scale(0.95); }

    .word-display { font-size: 3.8rem; font-weight: bold; margin: 50px 0 30px; min-height: 90px; letter-spacing: 3px; color: #2c3e50; text-shadow: 2px 2px 0px rgba(0,0,0,0.02); }
    
    /* 🎙️ 録音中ボタンのドクドク揺れるアニメーション */
    .btn-mic { background-color: #2196f3; color: white; border-radius: 50%; width: 95px; height: 95px; margin: 20px auto; font-size: 2.2rem; display: flex; align-items: center; justify-content: center; outline: none; border: none; cursor: pointer; box-shadow: 0 6px 12px rgba(33, 150, 243, 0.3); transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
    .btn-mic.recording { background-color: #e91e63; box-shadow: 0 6px 20px rgba(233, 30, 99, 0.5); animation: pulse 1.2s infinite ease-in-out; }
    
    .transcript-display { font-size: 1.4rem; color: #e91e63; min-height: 40px; margin-top: 10px; font-weight: bold; padding: 0 10px; }
    
    /* ⭕❌がバウンドして飛び出す巨大演出 */
    .effect { font-size: 9rem; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%) scale(0); display: none; z-index: 10; pointer-events: none; opacity: 0; transition: all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .effect.show { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    
    .score-title { font-size: 2.2rem; color: #4caf50; margin-bottom: 20px; }
    .score-time { font-size: 1.5rem; margin-bottom: 30px; }
    
    /* 🎬 アニメーションの定義 */
    @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 6px 12px rgba(233, 30, 99, 0.4); } 50% { transform: scale(1.12); box-shadow: 0 6px 25px rgba(233, 30, 99, 0.7); } 100% { transform: scale(1); box-shadow: 0 6px 12px rgba(233, 30, 99, 0.4); } }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 15%, 45%, 75% { transform: translateX(-10px); } 30%, 60%, 90% { transform: translateX(10px); } }
  </style>
</head>
<body>

  <div id="effect" class="effect"></div>

  <div id="page-title" class="page active">
    <h1>ひらがな クイズ</h1>
    <button class="btn btn-easy" onclick="startGame('easy')">かんたん スタート</button>
    <button class="btn btn-normal" onclick="startGame('normal')">ふつう スタート</button>
    <button class="btn btn-hard" onclick="startGame('hard')">むずかしい スタート</button>
  </div>

  <div id="page-main" class="page">
    <div class="status-bar">
      <div class="status-left">
        <div id="question-count">せいかい 0 / 10</div>
        <div id="timer">0 びょう</div>
      </div>
      <button class="btn-skip" onclick="skipQuestion()">つぎへ (ぱす)</button>
    </div>
    
    <div id="word-display" class="word-display">------</div>
    <button id="mic-button" class="btn btn-mic" onclick="toggleSpeech()">🎙️</button>
    <div id="transcript" class="transcript-display"></div>
  </div>

  <div id="page-score" class="page">
    <div class="score-title">🎉 ぜんもん クリア！ 🎉</div>
    <div class="score-time" id="final-time">かかったじかん: -- 秒</div>
    <button class="btn btn-easy" onclick="backToTitle()">もういちど あそぶ</button>
  </div>

  <script>
    // ⚠️ あなたのGASのURLをここに貼り付けてください！
    const gasUrl = "https://script.google.com/macros/s/AKfycbxSGOakKCrcALPeCknK0TpbQluJJFwxJ6sVgiPQ_bQZ76jpIOAHxopI63Sqs7KPXvzg/exec";

    let questions = [];
    let correctCount = 0;
    let timerInterval = null;
    let secondsElapsed = 0;
    let recognition = null;
    let isRecording = false;
    let isProcessing = false; 
    let audioCtx = null;
    let lastTranscript = ""; 

    function playSound(type) {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'correct') {
          const now = audioCtx.currentTime;
          osc.type = 'sine';
          osc.frequency.setValueAtTime(660, now);
          osc.frequency.setValueAtTime(880, now + 0.12);
          gain.gain.setValueAtTime(0.1, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
          osc.start(now);
          osc.stop(now + 0.4);
        } else if (type === 'wrong') {
          const now = audioCtx.currentTime;
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(180, now);
          gain.gain.setValueAtTime(0.15, now);
          gain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
          osc.start(now);
          osc.stop(now + 0.25);
        }
      } catch (e) { console.error(e); }
    }

    try {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = true; 
        recognition.continuous = false; 
        
        recognition.onresult = (event) => { 
          if (isProcessing) return;
          
          let interimTranscript = '';
          for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
              checkAnswer(event.results[i][0].transcript);
              return;
            } else {
              interimTranscript += event.results[i][0].transcript;
            }
          }
          if (interimTranscript) { lastTranscript = interimTranscript; }
        };
        recognition.onerror = () => { stopRecording(); };
        recognition.onend = () => { 
          stopRecording(); 
          if (!isProcessing && lastTranscript) { checkAnswer(lastTranscript); }
        };
      }
    } catch (e) { console.error(e); }

    function startGame(difficulty) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      showPage('page-title', false);
      document.getElementById('word-display').innerText = "よみこみちゅう...";
      showPage('page-main', true);

      fetch(`${gasUrl}?difficulty=${difficulty}`)
        .then(res => res.json())
        .then(data => {
          questions = data; 
          correctCount = 0;
          secondsElapsed = 0;
          isProcessing = false;
          lastTranscript = "";
          startTimer();
          displayQuestion();
        })
        .catch(err => {
          alert("データがとれませんでした。");
          backToTitle();
        });
    }

    function displayQuestion() {
      if (!questions || questions.length === 0) {
        endGame();
        return;
      }
      document.getElementById('question-count').innerText = `せいかい ${correctCount} / 10`;
      document.getElementById('word-display').innerText = questions[0].question; 
      document.getElementById('transcript').innerText = "";
      lastTranscript = "";
      isProcessing = false;
    }

    function toggleSpeech() {
      if (!recognition || isProcessing) return;
      if (isRecording) {
        recognition.stop(); 
      } else {
        isRecording = true;
        lastTranscript = "";
        document.getElementById('mic-button').classList.add('recording');
        document.getElementById('transcript').innerText = `🎙️ おはなししてね...`;
        recognition.start();
      }
    }

    function stopRecording() {
      isRecording = false;
      document.getElementById('mic-button').classList.remove('recording');
      if (document.getElementById('transcript').innerText === `🎙️ おはなししてね...`) {
        document.getElementById('transcript').innerText = "";
      }
    }

    function skipQuestion() {
      if (isProcessing || !questions || questions.length <= 1) return;
      if (isRecording) { recognition.stop(); }
      
      isProcessing = true; 
      const skipped = questions.shift(); 
      questions.push(skipped);           
      
      setTimeout(() => { displayQuestion(); }, 50);
    }

    function cleanKana(str) {
      return str.toString().trim().replace(/[\u30a1-\u30f6]/g, function(match) {
        return String.fromCharCode(match.charCodeAt(0) - 0x60);
      });
    }

    function checkAnswer(userAnswer) {
      isProcessing = true; 
      lastTranscript = ""; 

      const currentData = questions[0];
      const targetQuestion = cleanKana(currentData.question);
      const processedAnswer = cleanKana(userAnswer);

      // スプシのブロック対応の表記ゆれリストを読み込む
      const processedYureList = currentData.yure.map(y => cleanKana(y));

      // 正解そのもの、または表記ゆれリストのどれかに合致すれば正解！
      const isCorrect = (processedAnswer === targetQuestion) || processedYureList.includes(processedAnswer);

      if (isCorrect) {
        playSound('correct');
        correctCount++;
        document.getElementById('transcript').innerText = `きこえたよ: ${userAnswer} ⭕`;
        
        // 🎨 背景緑フラッシュON
        document.body.classList.add('correct-flash');
        
        showEffect('⭕', '#4caf50', () => {
          document.body.classList.remove('correct-flash');
          if (correctCount < 10) {
            questions.shift(); 
            displayQuestion();
          } else {
            endGame();
          }
        });
      } else {
        playSound('wrong');
        document.getElementById('transcript').innerText = `「${userAnswer}」じゃないよ！ ❌`;
        
        // 🎨 背景赤フラッシュ＆画面ガタガタON
        document.body.classList.add('wrong-flash');
        
        showEffect('❌', '#f44336', () => {
          document.body.classList.remove('wrong-flash');
          document.getElementById('transcript').innerText = "";
          isProcessing = false;
        });
      }
    }

    function showEffect(symbol, color, callback) {
      const effectDiv = document.getElementById('effect');
      effectDiv.innerText = symbol;
      effectDiv.style.color = color;
      
      effectDiv.style.display = 'block';
      setTimeout(() => { effectDiv.classList.add('show'); }, 10);
      
      setTimeout(() => { 
        effectDiv.classList.remove('show');
        effectDiv.style.display = 'none'; 
        callback(); 
      }, 1200);
    }

    function startTimer() {
      document.getElementById('timer').innerText = `0 びょう`;
      timerInterval = setInterval(() => { secondsElapsed++; document.getElementById('timer').innerText = `${secondsElapsed} びょう`; }, 1000);
    }
    function stopTimer() { clearInterval(timerInterval); }
    function endGame() {
      stopTimer();
      showPage('page-main', false);
      document.getElementById('final-time').innerText = `かかったじかん: ${secondsElapsed} びょう`;
      showPage('page-score', true);
    }
    function backToTitle() { showPage('page-score', false); showPage('page-main', false); showPage('page-title', true); }
    function showPage(pageId, isShow) {
      const page = document.getElementById(pageId);
      if (isShow) page.classList.add('active'); else page.classList.remove('active');
    }
  </script>
</body>
</html>
