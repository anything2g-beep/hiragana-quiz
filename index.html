<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ひらがな クイズ</title>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      margin: 0; padding: 0; background-color: #f7f9fa;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; color: #333; box-sizing: border-box;
    }
    .page { display: none; width: 100%; max-width: 480px; text-align: center; padding: 20px; box-sizing: border-box; }
    .active { display: block; }
    
    h1 { font-size: 2.5rem; color: #ff6b6b; margin-bottom: 40px; }
    .btn {
      display: block; width: 85%; margin: 15px auto; padding: 18px;
      font-size: 1.4rem; font-weight: bold; border: none; border-radius: 30px;
      cursor: pointer; transition: transform 0.1s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .btn:active { transform: scale(0.98); }
    .btn-easy { background-color: #4caf50; color: white; }
    .btn-normal { background-color: #ff9800; color: white; }
    .btn-hard { background-color: #f44336; color: white; }
    .btn-mic { background-color: #2196f3; color: white; border-radius: 50%; width: 90px; height: 90px; margin: 20px auto; font-size: 2rem; display: flex; align-items: center; justify-content: center; outline: none; }
    .btn-mic.recording { background-color: #e91e63; animation: pulse 1.5s infinite; }
    
    .status-bar { display: flex; justify-content: space-between; width: 90%; margin: 0 auto 20px; font-size: 1.1rem; font-weight: bold; color: #666; }
    .word-display { font-size: 3.5rem; font-weight: bold; margin: 40px 0; min-height: 80px; letter-spacing: 2px; color: #2c3e50; }
    .transcript-display { font-size: 1.2rem; color: #e91e63; min-height: 30px; margin-bottom: 10px; font-weight: bold; }
    
    .effect { font-size: 6rem; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 10; pointer-events: none; }
    .score-title { font-size: 2.2rem; color: #4caf50; margin-bottom: 20px; }
    .score-time { font-size: 1.5rem; margin-bottom: 30px; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
  </style>
</head>
<body>

  <div id="effect" class="effect"></div>

  <div id="page-title" class="page active">
    <h1>ひらがな　クイズ</h1>
    <button class="btn btn-easy" onclick="startGame('easy')">かんたん　スタート</button>
    <button class="btn btn-normal" onclick="startGame('normal')">ふつう　スタート</button>
    <button class="btn btn-hard" onclick="startGame('hard')">むずかしい　スタート</button>
  </div>

  <div id="page-main" class="page">
    <div class="status-bar">
      <div id="question-count">だい 1 もん</div>
      <div id="timer">0 びょう</div>
    </div>
    <div id="word-display" class="word-display">------</div>
    <button id="mic-button" class="btn btn-mic" onclick="toggleSpeech()">🎙️</button>
    <div id="transcript" class="transcript-display"></div>
  </div>

  <div id="page-score" class="page">
    <div class="score-title">🎉 ぜんもん クリア！ 🎉</div>
    <div class="score-time" id="final-time">かかったじかん: -- 秒</div>
    <button class="btn btn-easy" onclick="backToTitle()">もういちど あそぶ</button>
  </div>

  <script>
    // ⚠️ あなたのGASのURLをここに貼り付けてください！
    const gasUrl = "https://script.google.com/macros/s/AKfycbxFPWRqA5kafFjJO6_M4duy5L6ZPSJ5vuR5SklU6mh0UnK_B8hprhua4Km0q-Kax0gq/exec";

    let questions = [];
    let currentIdx = 0;
    let timerInterval = null;
    let secondsElapsed = 0;
    let recognition = null;
    let isRecording = false;

    // 音声認識の初期化
    try {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'ja-JP';
        recognition.interimResults = false;
        recognition.continuous = false; 

        recognition.onresult = (event) => {
          const resultText = event.results[0][0].transcript;
          checkAnswer(resultText);
        };
        recognition.onerror = (e) => {
          console.error("エラー:", e.error);
          stopRecording();
        };
        recognition.onend = () => { 
          stopRecording(); 
        };
      }
    } catch (e) { console.error(e); }

    function startGame(difficulty) {
      showPage('page-title', false);
      document.getElementById('word-display').innerText = "よみこみちゅう...";
      showPage('page-main', true);

      fetch(`${gasUrl}?difficulty=${difficulty}`)
        .then(res => res.json())
        .then(data => {
          questions = data;
          currentIdx = 0;
          secondsElapsed = 0;
          startTimer();
          displayQuestion();
        })
        .catch(err => {
          alert("データがとれませんでした。");
          backToTitle();
        });
    }

    function displayQuestion() {
      document.getElementById('question-count').innerText = `だい ${currentIdx + 1} もん / 10`;
      document.getElementById('word-display').innerText = questions[currentIdx];
      document.getElementById('transcript').innerText = "";
    }

    function toggleSpeech() {
      if (!recognition) return;
      if (isRecording) {
        recognition.stop();
        stopRecording();
      } else {
        isRecording = true;
        document.getElementById('mic-button').classList.add('recording');
        document.getElementById('transcript').innerText = `🎙️ おはなししてね...`;
        recognition.start();
      }
    }

    // 停止時は文字を綺麗に消す
    function stopRecording() {
      isRecording = false;
      document.getElementById('mic-button').classList.remove('recording');
      if (document.getElementById('transcript').innerText === `🎙️ おはなししてね...`) {
        document.getElementById('transcript').innerText = "";
      }
    }

    // 漢字・カタカナをひらがなに強制変換する関数（お店→おみせ対策）
    function toHiragana(str) {
      return str.replace(/[\u30a1-\u30f6]/g, function(match) {
        return String.fromCharCode(match.charCodeAt(0) - 0x60);
      }).replace(/[\u4e00-\u9faf]/g, function(match) {
        // 音声認識の一般的な漢字の読みをひらがなにする簡易マップ（代表的なもの）
        const kanjiMap = {
          "店": "みせ", "犬": "いぬ", "猫": "ねこ", "鳥": "とり", "猿": "さる", "牛": "うし", "馬": "うま", "蟹": "かに",
          "亀": "かめ", "蝦": "えび", "蛸": "たこ", "烏賊": "いか", "熊": "くま", "鹿": "しか", "栗": "くり", "柿": "かき",
          "桃": "もも", "梨": "なし", "肉": "にく", "魚": "さかな", "卵": "たまご", "車": "くるま", "船": "ふね", "机": "つくえ",
          "椅子": "いす", "本": "ほん", "傘": "かさ", "服": "ふく", "家": "いえ", "海": "うみ", "山": "やま", "川": "かわ",
          "池": "いけ", "花": "はな", "草": "くさ", "木": "き", "葉": "は", "空": "そら", "雲": "くも", "雨": "あめ",
          "雪": "ゆき", "風": "かぜ", "星": "ほし", "月": "つき", "太陽": "たいよう", "朝": "あさ", "昼": "ひる", "夜": "よる",
          "青": "あお", "赤": "あか", "黄色": "きいろ", "緑": "みどり", "白": "しろ", "黒": "くろ", "手": "て", "足": "あし",
          "目": "め", "口": "くち", "耳": "みみ", "鼻": "はな", "髪": "かみ", "指": "ゆび", "学校": "がっこう", "病院": "びょういん",
          "公園": "こうえん", "駅": "えき", "風船": "ふうせん", "花火": "はなび", "祭り": "まつり", "太鼓": "たいこ", "歌": "うた",
          "蜂": "はち", "蜘蛛": "くも", "蛙": "かえる", "金魚": "きんぎょ", "鯨": "くじら", "羊": "ひつじ", "豚": "ぶた",
          "燕": "つばめ", "烏": "からす", "雀": "すずめ", "鳩": "はと", "蝉": "せみ", "向日葵": "ひまわり", "桜": "さくら", "梅": "うめ"
        };
        return kanjiMap[match] || match;
      });
    }

    function checkAnswer(userAnswer) {
      // 問題と回答の両方をひらがなにして比較する
      const target = toHiragana(questions[currentIdx].toString().trim());
      const answer = toHiragana(userAnswer.toString().trim());

      document.getElementById('transcript').innerText = `きこえたよ: ${userAnswer}`;

      if (answer === target) {
        showEffect('⭕', () => {
          currentIdx++;
          if (currentIdx < 10) displayQuestion();
          else endGame();
        });
      } else {
        showEffect('❌', () => {
          document.getElementById('transcript').innerText = `ちがうかな？（きこえた音: ${userAnswer}）`;
        });
      }
    }

    function showEffect(symbol, callback) {
      const effectDiv = document.getElementById('effect');
      effectDiv.innerText = symbol;
      effectDiv.style.color = (symbol === '⭕') ? '#4caf50' : '#f44336';
      effectDiv.style.display = 'block';
      setTimeout(() => {
        effectDiv.style.display = 'none';
        callback();
      }, 1000);
    }

    function startTimer() {
      document.getElementById('timer').innerText = `0 びょう`;
      timerInterval = setInterval(() => {
        secondsElapsed++;
        document.getElementById('timer').innerText = `${secondsElapsed} びょう`;
      }, 1000);
    }
    function stopTimer() { clearInterval(timerInterval); }
    function endGame() {
      stopTimer();
      showPage('page-main', false);
      document.getElementById('final-time').innerText = `かかったじかん: ${secondsElapsed} びょう`;
      showPage('page-score', true);
    }
    function backToTitle() {
      showPage('page-score', false);
      showPage('page-main', false);
      showPage('page-title', true);
    }
    function showPage(pageId, isShow) {
      const page = document.getElementById(pageId);
      if (isShow) page.classList.add('active');
      else page.classList.remove('active');
    }
  </script>
</body>
</html>
